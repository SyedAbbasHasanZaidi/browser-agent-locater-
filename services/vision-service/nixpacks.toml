# Install uv as a nix package (not via pip — pip isn't available in the nix env).
# nixPkgs provides both python311 and uv from the nix package registry.
[phases.setup]
nixPkgs = ["python311", "uv"]

[phases.install]
cmds = ["uv sync"]

[start]
cmd = "uv run uvicorn vision_service.main:app --host 0.0.0.0 --port $PORT"
