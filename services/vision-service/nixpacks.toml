# Force nixpacks to use Python only — prevents it from detecting the
# monorepo's pnpm-workspace.yaml and trying to build the TypeScript SDK.
[phases.setup]
nixPkgs = ["python311"]

[phases.install]
cmds = ["pip install uv", "uv sync"]

[start]
cmd = "uv run uvicorn vision_service.main:app --host 0.0.0.0 --port $PORT"
