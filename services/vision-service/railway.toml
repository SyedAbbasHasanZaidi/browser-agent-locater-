[build]
builder = "nixpacks"

[deploy]
# Railway injects $PORT — never hardcode it.
# --host 0.0.0.0 is required so Railway's load balancer can reach the process.
startCommand = "uv run uvicorn vision_service.main:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
